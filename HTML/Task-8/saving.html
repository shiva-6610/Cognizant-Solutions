<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving User Preferences</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        #message {
            color: green;
            font-weight: bold;
            text-align: center;
        }

        .clear-btn {
            background-color: crimson;
            color: white;
            border: none;
            cursor: pointer;
        }

        .save-btn {
            background-color: darkblue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Event Preference Form</h2>

        <label for="eventType">Select Preferred Event Type:</label>

        <select id="eventType">
            <option value="">-- Select Event --</option>
            <option value="Music">Music Event</option>
            <option value="Sports">Sports Event</option>
            <option value="Technology">Technology Event</option>
            <option value="Cultural">Cultural Event</option>
        </select>

        <button class="save-btn" onclick="savePreference()">
            Save Preference
        </button>

        <button class="clear-btn" onclick="clearPreferences()">
            Clear Preferences
        </button>

        <p id="message"></p>

    </div>

    <script>

        // Retrieve saved preference on page load
        window.onload = function () {

            let savedEvent = localStorage.getItem("preferredEvent");

            if (savedEvent) {
                document.getElementById("eventType").value = savedEvent;
                document.getElementById("message").innerHTML =
                    "Saved Preference Loaded: " + savedEvent;
            }
        };

        // Save preference in localStorage
        function savePreference() {

            let selectedEvent =
                document.getElementById("eventType").value;

            if (selectedEvent === "") {
                alert("Please select an event type");
                return;
            }

            localStorage.setItem("preferredEvent", selectedEvent);

            // Example sessionStorage usage
            sessionStorage.setItem("sessionMessage",
                "User visited preference page");

            document.getElementById("message").innerHTML =
                "Preference Saved Successfully!";
        }

        // Clear localStorage and sessionStorage
        function clearPreferences() {

            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("eventType").value = "";

            document.getElementById("message").innerHTML =
                "Preferences Cleared!";
        }

    </script>

</body>
</html>
