<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <!-- Internal CSS -->
    <style>
        #welcomeBanner {
            background-color: #00b3ff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: rgb(158, 62, 18);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1 class="highlight">Welcome, User!</h1>
        <p>
            Enjoy our website and grab this
            <span style="color: white; font-weight: bold;">
                Special Offer!
            </span>
        </p>
    </div>

    <!-- Extra Highlighted Content -->
    <p class="highlight">
        Limited Time Discount Available!
    </p>

</body>
</html>
