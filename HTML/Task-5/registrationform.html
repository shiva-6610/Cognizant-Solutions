<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ab9164;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: rgb(119, 188, 174);
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: #411c1c;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #919e52;
            border-radius: 5px;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #8a3c61;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005fa3;
        }

        output {
            display: block;
            margin-top: 15px;
            color: green;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Event Registration Form</h2>

        <form onsubmit="showMessage(event)">

            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your full name" required autofocus>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="date">Event Date:</label>
            <input type="date" id="date" required>

            <label for="event">Event Type:</label>
            <select id="event" required>
                <option value="">-- Select Event --</option>
                <option>Music Show</option>
                <option>Workshop</option>
                <option>Sports Event</option>
                <option>Community Meeting</option>
            </select>

            <label for="message">Message:</label>
            <textarea id="message" rows="4"
                placeholder="Enter your message here"></textarea>

            <button type="submit">Register</button>

            <output id="result"></output>

        </form>
    </div>

    <script>
        function showMessage(event) {
            event.preventDefault();

            document.getElementById("result").value =
                "Registration submitted successfully!";
        }
    </script>

</body>
</html>
