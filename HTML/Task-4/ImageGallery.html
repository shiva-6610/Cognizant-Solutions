<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        td {
            padding: 15px;
        }

        .event-img {
            width: 250px;
            height: 180px;
            border: 4px solid darkblue;
            border-radius: 10px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <table border="1">

        <caption>Community Events Image Gallery</caption>

        <!-- Row 1 -->
        <tr>
            <td>
                <img src="event1.jpg" 
                     alt="Music Festival" 
                     title="Annual Music Festival"
                     class="event-img">
                <p><b>Music Festival 2025</b></p>
            </td>

            <td>
                <img src="event2.jpg" 
                     alt="Food Carnival" 
                     title="Community Food Carnival"
                     class="event-img">
                <p><b>Food Carnival</b></p>
            </td>
  
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>
                <img src="event3.jpg" 
                     alt="Art Exhibition" 
                     title="Community Art Exhibition"
                     class="event-img">
                <p><b>Art Exhibition</b></p>
            </td>

            <td>
                <img src="event4.jpg" 
                     alt="Tree Plantation" 
                     title="Environment Awareness Program"
                     class="event-img">
                <p><b>Tree Plantation Drive</b></p>
            </td>

        </tr>

    </table>

</body>
</html>
